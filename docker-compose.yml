services:
  db:
    image: postgres:17

    container_name: skillforge-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: skillforge
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: skillforge-backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - backend/.env

    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: skillforge-frontend
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"    
    volumes:
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - backend

volumes:
  postgres_data:
